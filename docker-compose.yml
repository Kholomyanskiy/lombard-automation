version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: lombard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lombard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-lombard_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lombard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: lombard_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lombard}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-lombard_db}
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
